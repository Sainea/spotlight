<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo — Spotlight Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { spotlight: { black: '#050505', dark: '#111111', cyan: '#00E0FF' } } }, fontFamily: { sans: ['Outfit', 'sans-serif'] } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #F9F6F0; transition: background-color 0.3s, color 0.3s; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Light Theme Overrides */
        body.light-mode { background-color: #F3F4F6 !important; color: #111827 !important; }
        body.light-mode .bg-spotlight-dark { background-color: #FFFFFF !important; border-color: #E5E7EB !important; color: #111827 !important; }
        body.light-mode .text-white { color: #111827 !important; }
        body.light-mode .text-gray-400 { color: #4B5563 !important; }
        body.light-mode .bg-white\/5 { background-color: #E5E7EB !important; color: #111827 !important; }
        body.light-mode .border-white\/10 { border-color: #D1D5DB !important; }
    </style>
    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
          new google.translate.TranslateElement({pageLanguage: 'es', includedLanguages: 'en,fr,de,pt,it', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        .goog-logo-link { display: none !important; }
        .goog-te-gadget { color: transparent !important; font-size: 0px !important; }
        .goog-te-gadget .goog-te-combo {
            background-color: #111 !important; color: #00E0FF !important; border: 1px solid rgba(255,255,255,0.1) !important;
            padding: 6px 10px !important; border-radius: 8px !important; font-size: 14px !important; font-weight: bold !important; outline: none !important; margin: 0 !important; cursor: pointer;
        }
        body.light-mode .goog-te-gadget .goog-te-combo { background-color: #fff !important; color: #000 !important; border-color: #ccc !important; }
    </style>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body class="font-sans antialiased min-h-screen">
    
    <nav class="border-b border-white/10 bg-spotlight-dark/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
            <a href="../index.html" class="font-bold tracking-tight text-lg">SPOTLIGHT <span class="text-spotlight-cyan">Catálogo</span></a>
            <div id="userMenu" class="flex items-center gap-3 overflow-x-auto hide-scrollbar flex-nowrap max-w-[60vw] md:max-w-none ml-auto pl-2 py-1">
                <!-- Widget oculto de Google -->
                <div class="shrink-0" style="width:0; height:0; overflow:hidden;"><div id="google_translate_element"></div></div>
                
                <!-- Select Personalizado de Idioma -->
                <select id="customLanguage" onchange="changeLanguage(this.value)" class="shrink-0 bg-spotlight-dark border border-white/10 text-spotlight-cyan font-bold py-2 px-3 rounded-lg outline-none text-sm cursor-pointer hover:border-spotlight-cyan">
                    <option value="es">🇨🇴 ES</option>
                    <option value="en">🇺🇸 EN</option>
                    <option value="fr">🇫🇷 FR</option>
                    <option value="pt">🇧🇷 PT</option>
                </select>

                <button onclick="toggleTheme()" class="shrink-0 btn-theme-toggle text-xl p-2 rounded-full hover:bg-white/10 transition-colors" title="Cambiar Tema">🌙</button>
                <a href="login.html" class="shrink-0 text-spotlight-cyan text-sm font-semibold">Iniciar Sesión</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-3xl font-bold mb-6">Explora Espacios en <span class="text-spotlight-cyan">Barranquilla</span></h2>
        
        <section class="py-8 border-b border-white/5 bg-black sticky top-16 z-40">
            <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="w-full md:w-1/3 relative flex gap-2">
                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">🔍</span>
                        <input type="text" id="searchInput" placeholder="Buscar por nombre o barrio..." class="w-full bg-white/5 border border-white/10 rounded-lg pl-10 pr-4 py-2 text-white focus:outline-none focus:border-spotlight-cyan focus:ring-1 focus:ring-spotlight-cyan transition-colors">
                    </div>
                    <button onclick="activarGPS()" id="btnGPS" class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-4 py-2 rounded-lg transition-colors flex items-center justify-center group" title="Buscar cerca de mí">
                        <span class="group-hover:scale-110 transition-transform">📍</span>
                    </button>
                </div>
                <div class="flex gap-2 overflow-x-auto w-full md:w-auto pb-2 md:pb-0 hide-scrollbar" id="filtrosCategoria">
                <button data-filter="Todos" class="filter-btn bg-spotlight-cyan text-black px-6 py-3 rounded-xl font-bold whitespace-nowrap transition-colors">Todos</button>
                <button data-filter="Cancha Deportiva" class="filter-btn bg-spotlight-dark border border-white/10 hover:border-spotlight-cyan px-6 py-3 rounded-xl font-semibold whitespace-nowrap transition-colors">Canchas</button>
                <button data-filter="Salón de Eventos" class="filter-btn bg-spotlight-dark border border-white/10 hover:border-spotlight-cyan px-6 py-3 rounded-xl font-semibold whitespace-nowrap transition-colors">Salones</button>
                <button data-filter="Auditorio Empresarial" class="filter-btn bg-spotlight-dark border border-white/10 hover:border-spotlight-cyan px-6 py-3 rounded-xl font-semibold whitespace-nowrap transition-colors">Auditorios</button>
            </div>
            </div>
        </section>
        
        <!-- Grid placeholder for spaces -->
        <div id="grid-espacios" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-spotlight-dark border border-white/10 p-6 rounded-xl text-center text-gray-500">
                Cargando espacios desde la base de datos...
            </div>
        </div>

        <!-- El Modal antiguo ha sido removido. Ahora usamos space.html -->
    </main>

    <script src="../data.js"></script>
    <script type="module">
        import { getUsuarioActual, cerrarSesion } from '../js/services/auth.js';
        import { obtenerTodosLosEspacios, obtenerEspaciosCacheados } from '../js/services/db.js';
        import { inicializarBotDeSoporte } from '../js/components/supportBot.js';
        import { inicializarTema } from '../js/components/theme.js';
        import { showToast } from '../js/components/toast.js';

        // Inicializar tema global
        inicializarTema();
        inicializarBotDeSoporte();

        // Check user
        const user = getUsuarioActual();
        if (user) {
            document.getElementById('userMenu').innerHTML = `
                <div id="google_translate_element" class="hidden md:block"></div>
                <button onclick="window.toggleTheme()" class="btn-theme-toggle text-xl p-2 rounded-full hover:bg-white/10 transition-colors">🌙</button>
                <span class="text-gray-400 text-sm">Hola, <strong class="text-white">${user.nombre}</strong></span>
                <a href="host_profile.html" class="text-spotlight-cyan text-sm hover:underline">Mis logros</a>
                <button id="btnSal" class="text-red-400 text-sm hover:text-red-300 font-semibold">Salir</button>
            `;
            document.getElementById('btnSal').addEventListener('click', () => {
                cerrarSesion();
            });
            
            // Toast de bienvenida si es nueva sesión
            if(sessionStorage.getItem('bienvenida_mostrada') !== 'si') {
                setTimeout(() => showToast(`¡Bienvenido de nuevo, ${user.nombre}! 👋`, 'success'), 800);
                sessionStorage.setItem('bienvenida_mostrada', 'si');
            }
        } else {
            document.getElementById('userMenu').innerHTML = `
                <div id="google_translate_element" class="hidden md:block"></div>
                <button onclick="window.toggleTheme()" class="btn-theme-toggle text-xl p-2 rounded-full hover:bg-white/10 transition-colors">🌙</button>
                <a href="login.html" class="text-spotlight-cyan text-sm font-semibold">Iniciar Sesión</a>
            `;
        }

        const grid = document.getElementById('grid-espacios');
        let todosLosEspacios = [];
        let filtroActual = 'Todos';
        let textoBusqueda = '';
        let userLocation = null;

        // Animación de Radar con Mapa Leaflet
        const radarOverlay = document.createElement('div');
        radarOverlay.className = 'fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300';
        radarOverlay.innerHTML = `
            <div id="radar-map" class="absolute inset-0 z-0 opacity-50"></div>
            <div class="relative w-64 h-64 rounded-full border border-spotlight-cyan/30 flex items-center justify-center mb-8 z-20">
                <div class="absolute inset-0 rounded-full border-2 border-spotlight-cyan/20 animate-[ping_3s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
                <!-- Escáner tipo Radar -->
                <div class="absolute w-1/2 h-1/2 top-0 right-0 origin-bottom-left border-r-2 border-spotlight-cyan bg-gradient-to-tr from-spotlight-cyan/50 to-transparent animate-[spin_2s_linear_infinite] rounded-tr-full"></div>
                <!-- Círculo central -->
                <div class="w-4 h-4 bg-spotlight-cyan rounded-full shadow-[0_0_20px_#00e0ff] z-10"></div>
            </div>
            <div class="z-20 text-center bg-black/60 backdrop-blur px-6 py-4 rounded-2xl border border-white/10">
                <h3 class="text-2xl font-bold text-white mb-2">Escaneando el perímetro...</h3>
                <p class="text-spotlight-cyan">Encontrando los mejores espacios cerca de ti</p>
            </div>
        `;
        document.body.appendChild(radarOverlay);
        let radarMapInstance = null;

        // Cambio de idioma global con Fallback
        function changeLanguage(lang) {
            const selectField = document.querySelector(".goog-te-combo");
            if(selectField) { 
                selectField.value = lang; 
                selectField.dispatchEvent(new Event("change", { bubbles: true, cancelable: true })); 
            } else {
                // Fallback agresivo para Safari iOS (fuerza traducción por cookie y recarga)
                document.cookie = `googtrans=/es/${lang}; path=/;`;
                document.cookie = `googtrans=/es/${lang}; domain=.${location.hostname}; path=/;`;
                window.location.reload();
            }
        }

        // Activar GPS
        window.activarGPS = () => {
            const btn = document.getElementById('btnGPS');
            
            if ("geolocation" in navigator) {
                // Mostrar radar overlay
                radarOverlay.classList.remove('opacity-0', 'pointer-events-none');
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };

                        try {
                            // Inicializar el mapa de Leaflet en el radar si no existe
                            if(!radarMapInstance) {
                                radarMapInstance = L.map('radar-map', { zoomControl: false }).setView([userLocation.lat, userLocation.lng], 14);
                                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                                    attribution: '&copy; OpenStreetMap',
                                    subdomains: 'abcd',
                                    maxZoom: 20
                                }).addTo(radarMapInstance);
                            } else {
                                radarMapInstance.setView([userLocation.lat, userLocation.lng], 14);
                            }
                            // Asegurar que Leaflet se renderice correctamente en contenedor oculto/visible
                            setTimeout(() => { if(radarMapInstance) radarMapInstance.invalidateSize(); }, 200);
                        } catch(err) {
                            console.error("Error al cargar mapa Leaflet: ", err);
                        }
                        
                        // Simular 3 segundos de escaneo para que se vea el mapa y la animación
                        setTimeout(() => {
                            radarOverlay.classList.add('opacity-0', 'pointer-events-none');
                            btn.innerHTML = '✅';
                            btn.classList.add('bg-spotlight-cyan', 'text-black');
                            btn.classList.remove('text-white', 'bg-white/5');
                            renderCards();
                        }, 3000);
                    },
                    (error) => {
                        radarOverlay.classList.add('opacity-0', 'pointer-events-none');
                        alert("No se pudo obtener la ubicación. Por favor, dale permisos a tu navegador.");
                        btn.innerHTML = '📍';
                    }
                );
            } else {
                alert("Tu navegador no soporta geolocalización.");
            }
        };

        // Fórmula Haversine
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radio en km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function renderCards() {
            // Filtrar
            let filtrados = todosLosEspacios;
            if (filtroActual !== 'Todos') {
                filtrados = filtrados.filter(e => (e.categoria || e.tipo) === filtroActual);
            }
            if (textoBusqueda) {
                const search = textoBusqueda.toLowerCase();
                filtrados = filtrados.filter(e => 
                    e.nombre.toLowerCase().includes(search) || 
                    (e.barrio || '').toLowerCase().includes(search)
                );
            }

            // Distancia y ordenamiento
            if (userLocation) {
                filtrados.forEach(e => {
                    if (e.lat && e.lng) {
                        e.distancia = calcularDistancia(userLocation.lat, userLocation.lng, e.lat, e.lng);
                    } else {
                        e.distancia = 9999;
                    }
                });
                filtrados.sort((a, b) => a.distancia - b.distancia);
            }

            if(filtrados.length > 0) {
                // Leer el plan del usuario actual
                let userPlan = 'Explorer';
                const currentU = getUsuarioActual();
                if(currentU && currentU.plan) userPlan = currentU.plan;

                grid.innerHTML = filtrados.map(e => {
                    const favs = JSON.parse(localStorage.getItem('spotlight_favoritos') || '[]');
                    const corazon = favs.includes(e.id) ? '❤️' : '🤍';
                    
                    // Calcular Descuento
                    let precioOriginal = e.precioPorHora || 80000;
                    let precioFinal = precioOriginal;
                    let esCancha = (e.categoria === 'Cancha Deportiva' || e.tipo === 'Cancha Deportiva');
                    let badgeAhorro = '';
                    let showOriginal = '';
                    
                    if (userPlan === 'Premium') {
                        let descuento = esCancha ? 0.10 : 0.15;
                        precioFinal = precioOriginal * (1 - descuento);
                        badgeAhorro = `<div class="absolute bottom-2 left-2 bg-spotlight-cyan text-black text-[10px] uppercase font-bold px-2 py-1 rounded shadow-lg">Premium: -$${(precioOriginal - precioFinal).toLocaleString('es-CO')}</div>`;
                        showOriginal = `<del class="text-xs text-gray-500 block">Antes $${precioOriginal.toLocaleString('es-CO')}</del>`;
                    } else if (userPlan === 'Élite') {
                        let descuento = esCancha ? 0.15 : 0.20;
                        precioFinal = precioOriginal * (1 - descuento);
                        badgeAhorro = `<div class="absolute bottom-2 left-2 bg-yellow-500 text-black text-[10px] uppercase font-bold px-2 py-1 rounded shadow-lg">Élite: -$${(precioOriginal - precioFinal).toLocaleString('es-CO')}</div>`;
                        showOriginal = `<del class="text-xs text-gray-500 block">Antes $${precioOriginal.toLocaleString('es-CO')}</del>`;
                    }

                    return `
                    <div onclick="window.location.href='space.html?id=${e.id}'" class="bg-spotlight-dark border border-white/10 rounded-xl overflow-hidden hover:border-spotlight-cyan/50 transition-colors group cursor-pointer relative flex flex-col h-full">
                        <!-- Botón Favorito Flotante -->
                        <div class="absolute top-2 left-2 z-10 w-8 h-8 flex items-center justify-center bg-black/50 backdrop-blur rounded-full text-sm">${corazon}</div>
                        
                        <div class="h-48 overflow-hidden relative shrink-0">
                            <img src="${e.imagen || 'https://images.unsplash.com/photo-1575361204480-aadea25e6e68'}" onerror="this.src='https://images.unsplash.com/photo-1526232761682-d26e03ac148e?auto=format&fit=crop&w=800&q=80'" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute top-2 right-2 bg-black/80 px-2 py-1 rounded text-xs text-spotlight-cyan border border-white/10 font-mono">${e.tipo || e.categoria || 'Espacio'}</div>
                            ${badgeAhorro}
                            ${(e.distancia && e.distancia < 9999) ? `<div class="absolute top-2 left-12 bg-white/90 backdrop-blur text-black text-[10px] font-bold px-2 py-1 rounded-full shadow-lg flex items-center gap-1">📍 A ${e.distancia.toFixed(1)} km</div>` : ''}
                        </div>
                        <div class="p-5 flex flex-col flex-1">
                            <h3 class="font-bold text-lg mb-1 line-clamp-1">${e.nombre}</h3>
                            <p class="text-sm text-gray-400 mb-4 line-clamp-1 flex-1">📍 ${e.barrio || 'Barranquilla'}</p>
                            <div class="flex justify-between items-end mt-auto">
                                <div>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-none mb-1">Precio por Hora</p>
                                    ${showOriginal}
                                    <p class="text-spotlight-cyan font-bold text-lg leading-none">$${precioFinal.toLocaleString('es-CO')} <span class="text-xs text-gray-400 font-normal">COP</span></p>
                                </div>
                                <div class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors border border-white/5 whitespace-nowrap">
                                    Ver Detalle
                                </div>
                            </div>
                        </div>
                    </div>
                `}).join('');
            } else {
                grid.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">No se encontraron espacios con esos filtros.</div>`;
            }
        }

        // Lógica de Buscador y Filtros
        document.getElementById('searchInput').addEventListener('input', (e) => {
            textoBusqueda = e.target.value;
            renderCards();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Quitar estilo activo de todos
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-spotlight-cyan', 'text-black');
                    b.classList.add('bg-spotlight-dark', 'text-white');
                });
                // Poner estilo activo al seleccionado
                e.target.classList.remove('bg-spotlight-dark', 'text-white');
                e.target.classList.add('bg-spotlight-cyan', 'text-black');
                
                filtroActual = e.target.dataset.filter;
                renderCards();
            });
        });

        // Eliminamos la lógica vieja del Modal. Ahora usamos Space Details Page.

        // 1. Mostrar Caché (0 segundos de espera)
        renderCards();

        // Lógica de Modo Oscuro / Claro — ahora gestionado por theme.js
        // (la función toggleTheme ya fue inyectada por theme.js)

        const cacheados = obtenerEspaciosCacheados();
        if (cacheados) {
            todosLosEspacios = cacheados;
            renderCards();
        } else {
            // Skeleton Loader (Si no hay caché, mostrar animación de carga)
            grid.innerHTML = Array(6).fill(`
                <div class="bg-spotlight-dark border border-white/10 rounded-xl overflow-hidden animate-pulse">
                    <div class="h-48 bg-white/5"></div>
                    <div class="p-5">
                        <div class="h-6 bg-white/10 rounded w-3/4 mb-2"></div>
                        <div class="h-4 bg-white/5 rounded w-1/2 mb-6"></div>
                        <div class="flex justify-between items-end">
                            <div class="space-y-2"><div class="h-3 bg-white/5 rounded w-20"></div><div class="h-5 bg-white/10 rounded w-24"></div></div>
                            <div class="h-9 bg-white/10 rounded w-20"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 2. Traer los datos reales en segundo plano (Stale-While-Revalidate)
        obtenerTodosLosEspacios().then(espaciosR => {
            todosLosEspacios = espaciosR;
            // Solo actualizamos la pantalla si la caché estaba vacía o si hubo cambios
            if (!cacheados || JSON.stringify(cacheados) !== JSON.stringify(espaciosR)) {
                renderCards();
            }
        });

    </script>
</body>
</html>
